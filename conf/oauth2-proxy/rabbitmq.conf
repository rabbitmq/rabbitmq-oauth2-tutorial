auth_backends.1 = rabbit_auth_backend_oauth2

management.oauth_enabled = true
management.oauth_initiated_logon_type = idp_initiated
management.oauth_provider_url = http://localhost:4180

auth_oauth2.resource_server_id = rabbitmq
auth_oauth2.issuer = https://keycloak:8443/realms/test
#auth_oauth2.end_session_endpoint = http://localhost:4180/oauth2/sign_out?rd=https://keycloak:8443/realms/test/protocol/openid-connect/logout
auth_oauth2.https.cacertfile = /etc/keycloak/certs
auth_oauth2.preferred_username_claims.1 = preferred_username
